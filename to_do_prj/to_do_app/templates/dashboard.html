{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your To-Do Dashboard - Manage your tasks">
    <title>Dashboard - To-Do App</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <!-- Navigation Bar -->
    <div
        style="position: sticky; top: 0; z-index: 100; background: rgba(15, 12, 41, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 1rem 0;">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <img src="{% static 'images/todo_icon.png' %}" alt="Icon" style="width: 40px; height: 40px;">
                    <h2
                        style="margin: 0; font-size: 1.5rem; background: linear-gradient(135deg, #667eea 0%, #00f2fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                        To-Do Dashboard
                    </h2>
                </div>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <span style="color: rgba(255, 255, 255, 0.7);">Welcome back!</span>
                    <a href="/" class="btn btn-secondary" style="padding: 0.5rem 1.5rem;">
                        <span style="position: relative; z-index: 1;">Logout</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="page-wrapper" style="padding-top: 2rem;">
        <div class="container">
            <!-- Dashboard Header -->
            <div class="dashboard-header scale-in">
                <div class="icon-wrapper" style="width: 100px; height: 100px;">
                    <img src="{% static 'images/todo_icon.png' %}" alt="To-Do Icon">
                </div>
                <h1 style="margin-bottom: 0.5rem;">Your Tasks</h1>
                <p style="color: rgba(255, 255, 255, 0.7); font-size: 1.1rem;">
                    Stay organized and productive
                </p>
            </div>

            <!-- Add Task Section -->
            <div class="glass-card fade-in-up delay-1" style="max-width: 700px; margin: 0 auto 2rem;">
                <h3 style="color: #00f2fe; margin-bottom: 1.5rem; text-align: center;">
                    ➕ Add New Task
                </h3>
                <form id="addTaskForm" style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <input type="text" id="taskInput" placeholder="What needs to be done?"
                        style="flex: 1; min-width: 250px; margin-bottom: 0;">
                    <button type="submit" class="btn btn-primary" style="margin-bottom: 0;">
                        <span style="position: relative; z-index: 1;">Add Task</span>
                    </button>
                </form>
            </div>

            <!-- Stats Cards -->
            <div class="todo-grid fade-in-up delay-2" style="margin-bottom: 2rem;">
                <div class="card-3d" style="text-align: center;">
                    <div style="font-size: 3rem; margin-bottom: 0.5rem;">📋</div>
                    <h3 style="color: #667eea; margin-bottom: 0.5rem;" id="totalTasks">0</h3>
                    <p style="color: rgba(255, 255, 255, 0.7); margin: 0;">Total Tasks</p>
                </div>

                <div class="card-3d" style="text-align: center;">
                    <div style="font-size: 3rem; margin-bottom: 0.5rem;">✅</div>
                    <h3 style="color: #00f2fe; margin-bottom: 0.5rem;" id="completedTasks">0</h3>
                    <p style="color: rgba(255, 255, 255, 0.7); margin: 0;">Completed</p>
                </div>

                <div class="card-3d" style="text-align: center;">
                    <div style="font-size: 3rem; margin-bottom: 0.5rem;">⏳</div>
                    <h3 style="color: #f5576c; margin-bottom: 0.5rem;" id="pendingTasks">0</h3>
                    <p style="color: rgba(255, 255, 255, 0.7); margin: 0;">Pending</p>
                </div>
            </div>

            <!-- Tasks List -->
            <div class="glass-card fade-in-up delay-3">
                <h3 style="color: #667eea; margin-bottom: 1.5rem; text-align: center;">
                    📝 Your Tasks
                </h3>

                <!-- Filter Buttons -->
                <div style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap;">
                    <button class="filter-btn active" data-filter="all"
                        style="padding: 0.5rem 1.5rem; background: rgba(102, 126, 234, 0.3); border: 2px solid #667eea; border-radius: 8px; color: white; cursor: pointer; font-weight: 600; transition: all 0.3s;">
                        All
                    </button>
                    <button class="filter-btn" data-filter="pending"
                        style="padding: 0.5rem 1.5rem; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: white; cursor: pointer; font-weight: 600; transition: all 0.3s;">
                        Pending
                    </button>
                    <button class="filter-btn" data-filter="completed"
                        style="padding: 0.5rem 1.5rem; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: white; cursor: pointer; font-weight: 600; transition: all 0.3s;">
                        Completed
                    </button>
                </div>

                <!-- Tasks Container -->
                <div id="tasksContainer" style="min-height: 200px;">
                    <!-- Tasks will be dynamically added here -->
                    <div style="text-align: center; padding: 3rem; color: rgba(255, 255, 255, 0.5);">
                        <div style="font-size: 4rem; margin-bottom: 1rem;">📭</div>
                        <p style="font-size: 1.2rem;">No tasks yet. Add your first task above!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="{% static 'js/animations.js' %}"></script>

    <script>
        // Server-backed Task Management
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        const csrftoken = getCookie('csrftoken');
        let tasks = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', function () {
            loadTasks();
            updateStats();

            document.getElementById('addTaskForm').addEventListener('submit', function (e) {
                e.preventDefault();
                addTask();
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('active');
                        b.style.background = 'rgba(255, 255, 255, 0.05)';
                        b.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                    });
                    this.classList.add('active');
                    this.style.background = 'rgba(102, 126, 234, 0.3)';
                    this.style.borderColor = '#667eea';
                    currentFilter = this.dataset.filter;
                    renderTasks();
                });
            });
        });

        function loadTasks() {
            fetch('/api/tasks/')
                .then(resp => resp.json())
                .then(data => {
                    tasks = data.map(t => ({ id: t.id, text: t.title, completed: t.completed, createdAt: t.created_at }));
                    renderTasks();
                    updateStats();
                }).catch(err => console.error(err));
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (text === '') return;

            fetch('/api/tasks/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken
                },
                body: JSON.stringify({ title: text })
            })
                .then(resp => resp.json())
                .then(task => {
                    tasks.unshift({ id: task.id, text: task.title, completed: task.completed, createdAt: task.created_at });
                    input.value = '';
                    renderTasks();
                    updateStats();
                    input.style.transform = 'scale(1.05)';
                    setTimeout(() => input.style.transform = 'scale(1)', 200);
                }).catch(err => console.error(err));
        }

        function toggleTask(id) {
            fetch(`/api/tasks/${id}/toggle/`, {
                method: 'POST',
                headers: { 'X-CSRFToken': csrftoken }
            }).then(resp => resp.json()).then(data => {
                const t = tasks.find(x => x.id === id);
                if (t) {
                    t.completed = data.completed;
                    renderTasks();
                    updateStats();
                }
            }).catch(err => console.error(err));
        }

        function deleteTask(id) {
            fetch(`/api/tasks/${id}/delete/`, {
                method: 'POST',
                headers: { 'X-CSRFToken': csrftoken }
            }).then(() => {
                tasks = tasks.filter(t => t.id !== id);
                renderTasks();
                updateStats();
            }).catch(err => console.error(err));
        }

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            let filteredTasks = tasks;

            if (currentFilter === 'completed') {
                filteredTasks = tasks.filter(t => t.completed);
            } else if (currentFilter === 'pending') {
                filteredTasks = tasks.filter(t => !t.completed);
            }

            if (filteredTasks.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: rgba(255, 255, 255, 0.5);">
                        <div style="font-size: 4rem; margin-bottom: 1rem;">📭</div>
                        <p style="font-size: 1.2rem;">No ${currentFilter === 'all' ? '' : currentFilter} tasks found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredTasks.map(task => `
                <div class="todo-item" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; opacity: 0; animation: fadeInUp 0.4s ease forwards;">
                    <input 
                        type="checkbox" 
                        ${task.completed ? 'checked' : ''} 
                        onchange="toggleTask(${task.id})"
                        style="width: 24px; height: 24px; cursor: pointer; accent-color: #667eea;"
                    >
                    <div style="flex: 1;">
                        <p style="margin: 0; color: ${task.completed ? 'rgba(255, 255, 255, 0.5)' : 'rgba(255, 255, 255, 0.9)'}; text-decoration: ${task.completed ? 'line-through' : 'none'}; font-size: 1.1rem;">
                            ${task.text}
                        </p>
                        <small style="color: rgba(255, 255, 255, 0.4);">
                            ${new Date(task.createdAt).toLocaleDateString()} ${new Date(task.createdAt).toLocaleTimeString()}
                        </small>
                    </div>
                    <button 
                        onclick="editTask(${task.id})"
                        style="background: rgba(102, 126, 234, 0.12); border: 2px solid #667eea; color: #667eea; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; margin-right: 0.5rem; transition: all 0.3s;"
                        onmouseover="this.style.background='rgba(102, 126, 234, 0.22)'"
                        onmouseout="this.style.background='rgba(102, 126, 234, 0.12)'"
                    >
                        Edit
                    </button>
                    <button 
                        onclick="deleteTask(${task.id})"
                        style="background: rgba(245, 87, 108, 0.2); border: 2px solid #f5576c; color: #f5576c; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s;"
                        onmouseover="this.style.background='rgba(245, 87, 108, 0.4)'"
                        onmouseout="this.style.background='rgba(245, 87, 108, 0.2)'"
                    >
                        Delete
                    </button>
                </div>
            `).join('');
        }

        function editTask(id) {
            const t = tasks.find(x => x.id === id);
            if (!t) return;
            const newTitle = prompt('Edit task', t.text);
            if (newTitle === null) return; // cancelled
            const title = newTitle.trim();
            if (title === '') return;

            fetch(`/api/tasks/${id}/edit/`, {
                method: 'POST',
                headers: {
                'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken
                },
                body: JSON.stringify({ title: title })
            }).then(resp => resp.json()).then(data => {
                const idx = tasks.findIndex(x => x.id === id);
                if (idx !== -1) {
                    tasks[idx].text = data.title;
                    renderTasks();
                    updateStats();
                }
            }).catch(err => console.error(err));
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = pending;
        }
    </script>

    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>

</html>
